<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" role="img" aria-label="image_lib logo">
  <title>image_lib</title>
  <desc>A cute bun-shaped logo with a stamp face and a crop frame, representing the image_lib library.</desc>

  <!-- 背景圆 -->
  <defs>
    <radialGradient id="bunBody" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#FFF2DC"/>
      <stop offset="60%" stop-color="#F7C98A"/>
      <stop offset="100%" stop-color="#D88B3E"/>
    </radialGradient>
    <linearGradient id="stampInk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF99A8"/>
      <stop offset="100%" stop-color="#E55D72"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 浅色阴影底圆，避免纯白背景下视觉漂浮 -->
  <circle cx="160" cy="170" r="138" fill="#FFE9D6" opacity="0.55"/>

  <!-- 主体：Bun 形状（椭圆面包） -->
  <g filter="url(#softShadow)">
    <ellipse cx="160" cy="170" rx="125" ry="105" fill="url(#bunBody)" stroke="#8C5A22" stroke-width="3"/>

    <!-- 面包顶部高光 -->
    <ellipse cx="138" cy="115" rx="48" ry="20" fill="#FFFCEE" opacity="0.55"/>

    <!-- 芝麻颗粒（呼应 Bun 的 emoji） -->
    <g fill="#7A4A18">
      <ellipse cx="105" cy="125" rx="3.5" ry="2" transform="rotate(-25 105 125)"/>
      <ellipse cx="195" cy="118" rx="3.5" ry="2" transform="rotate(15 195 118)"/>
      <ellipse cx="155" cy="105" rx="3.5" ry="2" transform="rotate(-5 155 105)"/>
      <ellipse cx="85"  cy="160" rx="3.5" ry="2" transform="rotate(-50 85 160)"/>
      <ellipse cx="225" cy="155" rx="3.5" ry="2" transform="rotate(35 225 155)"/>
      <ellipse cx="135" cy="145" rx="3.5" ry="2" transform="rotate(-15 135 145)"/>
      <ellipse cx="180" cy="138" rx="3.5" ry="2" transform="rotate(10 180 138)"/>
    </g>
  </g>

  <!-- 印章卡片：贴在 Bun 正面，含粉色"DRAFT"字 -->
  <g transform="translate(60 175) rotate(-6)" filter="url(#softShadow)">
    <!-- 印章边框（圆角矩形，模拟 draft 印章） -->
    <rect x="0" y="0" rx="22" ry="22" width="200" height="78"
          fill="#FFFFFF" stroke="url(#stampInk)" stroke-width="5"/>
    <!-- 内层装饰线 -->
    <rect x="9" y="9" rx="16" ry="16" width="182" height="60"
          fill="none" stroke="url(#stampInk)" stroke-width="2" stroke-dasharray="4 3" opacity="0.7"/>
    <!-- 文字 -->
    <text x="100" y="52" text-anchor="middle"
          font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif"
          font-size="36" font-weight="800" fill="url(#stampInk)" letter-spacing="2">
      DRAFT
    </text>
  </g>

  <!-- 抠图四角框（呼应 crop 功能），用虚线表达"裁剪选区" -->
  <g stroke="#3A6EA5" stroke-width="4" stroke-linecap="round" fill="none">
    <!-- 左上 -->
    <path d="M30,80 L30,55 L55,55"/>
    <!-- 右上 -->
    <path d="M290,80 L290,55 L265,55"/>
    <!-- 左下 -->
    <path d="M30,260 L30,285 L55,285"/>
    <!-- 右下 -->
    <path d="M290,260 L290,285 L265,285"/>
  </g>

  <!-- 顶部蒸汽（Bun 热腾腾） -->
  <g fill="none" stroke="#9EBFD9" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <path d="M115 50 q-6 -12 0 -22 q6 -10 0 -20"/>
    <path d="M160 42 q-6 -12 0 -22 q6 -10 0 -20"/>
    <path d="M205 50 q-6 -12 0 -22 q6 -10 0 -20"/>
  </g>
</svg>